# Silso Typeractive Corne - peripheral/right half
# Mouse/scroll bindings enabled; host Bluetooth and Studio settings remain central-only.

# Uncomment the following line to enable deep sleep
# CONFIG_ZMK_SLEEP=y

# Increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Required because the shared keymap contains mouse/scroll bindings.
CONFIG_ZMK_POINTING=y

# Do not add ZMK Studio or expanded Bluetooth host settings on this peripheral half.
