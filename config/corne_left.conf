# Silso Typeractive Corne - central/left half
# 10 Bluetooth host profiles + ZMK Studio + mouse/scroll support

# Uncomment the following line to enable deep sleep
# CONFIG_ZMK_SLEEP=y

# Increase the keyboard's wireless range
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Enable eager debouncing
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=1
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=10

# Keep ZMK Studio enabled on the left/USB-connected central half.
# The existing build.yaml already supplies studio-rpc-usb-uart to corne_left.
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# Uncomment to enable USB Logging; this increases power use significantly.
# CONFIG_ZMK_USB_LOGGING=y

# Required for &mkp, &mmv, and &msc mouse/scroll bindings.
CONFIG_ZMK_POINTING=y

# Ten Bluetooth host profiles plus one split-peripheral connection.
# On a split keyboard, ZMK specifies this on the central half only.
CONFIG_BT_MAX_CONN=11
CONFIG_BT_MAX_PAIRED=11

# Rebuild after custom nice!view artwork update
